<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoCheck - บันทึกตำแหน่งของคุณ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css?family=Roboto+Mono%7CGoogle+Sans:400,500,600,700');
        body {
            font-family: 'Google Sans', sans-serif;
            background-color: #f7f9fb;
        }
        .card {
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .animate-blink { animation: blink 1.2s ease-in-out infinite; }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#4f46e5',
                        'secondary': '#10b981',
                        'danger': '#ef4444',
                        'background': '#f7f9fb',
                    }
                }
            }
        }
    </script>
</head>
<body class="p-4 md:p-8">

<div id="app" class="max-w-xl mx-auto min-h-screen">
    <!-- กลับหน้าหลัก -->
    <a href="index.html" class="fixed top-4 left-4 z-50 px-4 py-2 bg-white text-gray-700 font-semibold rounded-full shadow-md hover:bg-gray-100 transition-colors border border-gray-200">
        &larr; กลับหน้าหลัก
    </a>
    
    <header class="text-center mb-8 mt-14">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-primary text-white rounded-full mb-4 shadow-lg shadow-indigo-200">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </div>
        <h1 class="text-3xl font-bold text-gray-800">GeoCheck</h1>
        <p class="text-gray-500 mt-1">บันทึกตำแหน่งพิกัดของคุณ</p>
    </header>

    <!-- Location Card -->
    <div class="card bg-white p-6 rounded-2xl border border-gray-100 mb-6">
        <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-4 flex items-center">
            <span class="mr-2">📡</span> ตำแหน่งปัจจุบัน
        </h2>
        <div class="space-y-3">
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                <span class="text-xs font-mono text-gray-500 uppercase">LAT</span>
                <span id="lat" class="font-semibold text-gray-800 animate-blink">กำลังดึงข้อมูล...</span>
            </div>
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                <span class="text-xs font-mono text-gray-500 uppercase">LNG</span>
                <span id="lng" class="font-semibold text-gray-800 animate-blink">—</span>
            </div>
            <div class="flex flex-col gap-1 p-3 bg-gray-50 rounded-xl border border-gray-100">
                <span class="text-xs font-mono text-gray-500 uppercase">ที่อยู่</span>
                <span id="address" class="text-sm text-gray-800 font-medium animate-blink">—</span>
            </div>
            <div class="flex justify-between items-center p-3 bg-gray-50 rounded-xl border border-gray-100">
                <span class="text-xs font-mono text-gray-500 uppercase">ความแม่นยำ</span>
                <span id="accuracy" class="text-sm font-semibold text-gray-800">—</span>
            </div>
        </div>
    </div>

    <!-- Note Card -->
    <div class="card bg-white p-6 rounded-2xl border border-gray-100 mb-6">
        <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-4 flex items-center">
            <span class="mr-2">📝</span> บันทึกเพิ่มเติม (ไม่บังคับ)
        </h2>
        <textarea id="noteInput" rows="2" class="w-full p-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder-gray-400 text-gray-700" placeholder="เช่น ร้านกาแฟ, ออฟฟิศ, บ้าน..."></textarea>
    </div>

    <button id="checkinBtn" onclick="doCheckin()" class="w-full py-4 bg-primary hover:bg-indigo-700 text-white font-bold rounded-2xl shadow-lg shadow-indigo-200 transition-all transform active:scale-[0.98] flex items-center justify-center gap-2 text-lg uppercase tracking-wider">
        <span>📍</span> CHECK-IN ตอนนี้
    </button>

    <div id="statusMsg" class="mt-4 p-3 rounded-xl text-center hidden animate-fade-in font-medium"></div>

    <!-- History Card -->
    <div class="card bg-white p-6 rounded-2xl border border-gray-100 mt-8 mb-20">
        <div class="flex justify-between items-center mb-6">
            <div>
                <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400">🕐 ประวัติ Check-in</h2>
                <span id="countBadge" class="inline-block mt-1 px-2 py-0.5 bg-indigo-50 text-primary text-xs font-bold rounded-full">0 ครั้ง</span>
            </div>
            <button onclick="clearHistory()" class="text-xs font-semibold text-danger hover:underline">ล้างทั้งหมด</button>
        </div>

        <div id="historyList" class="space-y-4">
            <!-- History items will be injected here -->
            <div class="text-center py-10 text-gray-400">
                <svg class="w-12 h-12 mx-auto mb-3 opacity-20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                <p>ยังไม่มีประวัติ<br>กด Check-in เพื่อเริ่มต้น</p>
            </div>
        </div>
    </div>
</div>

<script>
  let currentLat = null, currentLng = null, currentAccuracy = null;
  let history = JSON.parse(localStorage.getItem('checkin_history') || '[]');

  function getLocation() {
    if (!navigator.geolocation) {
      const latEl = document.getElementById('lat');
      latEl.textContent = 'ไม่รองรับ GPS';
      latEl.classList.remove('animate-blink');
      return;
    }
    navigator.geolocation.watchPosition(
      pos => {
        currentLat = pos.coords.latitude;
        currentLng = pos.coords.longitude;
        currentAccuracy = pos.coords.accuracy;

        document.getElementById('lat').textContent = currentLat.toFixed(6);
        document.getElementById('lng').textContent = currentLng.toFixed(6);
        document.getElementById('accuracy').textContent = `±${Math.round(currentAccuracy)} เมตร`;
        
        ['lat','lng','address'].forEach(id => document.getElementById(id).classList.remove('animate-blink'));

        reverseGeocode(currentLat, currentLng);
      },
      err => {
        const el = document.getElementById('lat');
        el.textContent = err.code === 1 ? 'ไม่อนุญาต GPS' : 'ไม่พบตำแหน่ง';
        el.classList.remove('animate-blink');
        document.getElementById('address').textContent = '—';
        document.getElementById('address').classList.remove('animate-blink');
      },
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }

  async function reverseGeocode(lat, lng) {
    const el = document.getElementById('address');
    el.textContent = 'กำลังค้นหา...';
    try {
      const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&accept-language=th`);
      const data = await res.json();
      const addr = data.display_name || 'ไม่พบที่อยู่';
      el.textContent = addr;
      el.classList.remove('animate-blink');
      el._fullAddress = data.display_name || '';
    } catch {
      el.textContent = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      el.classList.remove('animate-blink');
    }
  }

  function doCheckin() {
    if (!currentLat || !currentLng) {
      showStatus('กรุณารอให้ระบบดึงตำแหน่งก่อน', 'error');
      return;
    }

    const btn = document.getElementById('checkinBtn');
    btn.disabled = true;
    btn.innerHTML = '<span>⏳</span> กำลังบันทึก...';

    const note = document.getElementById('noteInput').value.trim();
    const addrEl = document.getElementById('address');
    const address = addrEl._fullAddress || addrEl.textContent;

    const entry = {
      id: Date.now(),
      timestamp: new Date().toISOString(),
      lat: currentLat,
      lng: currentLng,
      accuracy: currentAccuracy,
      address: address,
      note: note
    };

    history.unshift(entry);
    localStorage.setItem('checkin_history', JSON.stringify(history));
    document.getElementById('noteInput').value = '';

    renderHistory();
    showStatus(`✅ Check-in สำเร็จ!`, 'success');

    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = '<span>📍</span> CHECK-IN ตอนนี้';
    }, 2000);
  }

  function renderHistory() {
    const list = document.getElementById('historyList');
    document.getElementById('countBadge').textContent = `${history.length} ครั้ง`;

    if (history.length === 0) {
      list.innerHTML = `<div class="text-center py-10 text-gray-400">
                <svg class="w-12 h-12 mx-auto mb-3 opacity-20" fill="currentColor" viewBox="0 0 24 24">
                    <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                <p>ยังไม่มีประวัติ<br>กด Check-in เพื่อเริ่มต้น</p>
            </div>`;
      return;
    }

    list.innerHTML = history.map((item, i) => {
      const d = new Date(item.timestamp);
      const dateStr = d.toLocaleDateString('th-TH', { day:'2-digit', month:'short', year:'numeric' });
      const timeStr = d.toLocaleTimeString('th-TH', { hour:'2-digit', minute:'2-digit' });

      return `<div class="p-4 bg-gray-50 rounded-xl border border-gray-100 relative overflow-hidden">
        <div class="flex justify-between items-start mb-2">
            <span class="text-[10px] font-bold text-primary bg-indigo-50 px-2 py-0.5 rounded-full uppercase tracking-tighter">
                ${dateStr} • ${timeStr}
            </span>
            <span class="text-[10px] font-mono text-gray-400">#${history.length - i}</span>
        </div>
        <div class="text-sm text-gray-800 font-medium mb-2 leading-relaxed">📍 ${item.address}</div>
        <div class="flex flex-wrap gap-2 mb-3">
          <span class="text-[10px] font-mono bg-white px-2 py-1 rounded border border-gray-100 text-gray-500">LAT: ${item.lat.toFixed(6)}</span>
          <span class="text-[10px] font-mono bg-white px-2 py-1 rounded border border-gray-100 text-gray-500">LNG: ${item.lng.toFixed(6)}</span>
          ${item.accuracy ? `<span class="text-[10px] font-mono bg-white px-2 py-1 rounded border border-gray-100 text-gray-500">±${Math.round(item.accuracy)}m</span>` : ''}
        </div>
        ${item.note ? `<div class="text-xs bg-indigo-50/50 p-2 rounded-lg text-indigo-700 border-l-2 border-primary mb-3">💬 ${item.note}</div>` : ''}
        <a href="https://maps.google.com/?q=${item.lat},${item.lng}" target="_blank" class="inline-flex items-center text-xs font-bold text-primary hover:underline">
            เปิดใน Google Maps &rarr;
        </a>
      </div>`;
    }).join('');
  }

  function clearHistory() {
    if (history.length === 0) return;
    if (confirm('ต้องการลบประวัติทั้งหมดใช่ไหม?')) {
      history = [];
      localStorage.removeItem('checkin_history');
      renderHistory();
      showStatus('ลบประวัติทั้งหมดแล้ว', 'error');
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('statusMsg');
    el.className = 'mt-4 p-3 rounded-xl text-center font-medium ';
    if (type === 'success') {
        el.classList.add('bg-emerald-50', 'text-emerald-700', 'border', 'border-emerald-100');
    } else {
        el.classList.add('bg-rose-50', 'text-rose-700', 'border', 'border-rose-100');
    }
    el.textContent = msg;
    el.classList.remove('hidden');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.add('hidden'), 3500);
  }

  getLocation();
  renderHistory();
</script>
</body>
</html>
