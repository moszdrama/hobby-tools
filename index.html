        // Function to create an app card
        function createAppCard(app) {

            card.className = "flex flex-col items-center p-6 bg-gray-50 rounded-xl shadow-sm hover:shadow-lg transition-shadow duration-300 transform hover:-translate-y-1";
            
            card.innerHTML = `
                <div class="text-5xl mb-4">
                    ${app.icon}
                </div>
                <h3 class="text-xl font-medium text-gray-900 text-center mb-2">
                    ${app.name}
                </h3>
                <p class="text-sm text-gray-500 text-center">
                    ${app.description}
                </p>
            `;

            return card;
        }

        // Loop through the apps array and add cards to the grid
        apps.forEach(app => {
            appGrid.appendChild(createAppCard(app));
