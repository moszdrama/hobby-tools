<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คสถานะพัสดุ LEX - คุณมอส</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap');
        body { font-family: 'Kanit', sans-serif; }
        .status-card { transition: all 0.3s ease; }
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(59, 130, 246, 0.5); }
            100% { box-shadow: 0 0 0 15px rgba(59, 130, 246, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div class="max-w-md mx-auto p-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">Parcel Tracker</h1>
                <p class="text-sm text-slate-500">สำหรับคุณมอส (Pixel 8a)</p>
            </div>
            <div id="connectionStatus" class="h-3 w-3 rounded-full bg-green-500"></div>
        </div>

        <!-- Setup Card -->
        <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-100 mb-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">เลขพัสดุ (LEX)</label>
                    <input type="text" id="trackingNumber" value="LEXPU0670402759" class="w-full p-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">ความถี่ในการเช็ค (นาที)</label>
                    <select id="interval" class="w-full p-3 rounded-xl border border-slate-200 outline-none">
                        <option value="1">1 นาที (ทดสอบ)</option>
                        <option value="5" selected>5 นาที</option>
                        <option value="15">15 นาที</option>
                        <option value="30">30 นาที</option>
                    </select>
                </div>
                <button id="startBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                    <i class="fas fa-play"></i> เริ่มติดตามสถานะ
                </button>
            </div>
        </div>

        <!-- Status Display -->
        <div id="displayArea" class="hidden space-y-4">
            <div class="status-card bg-white rounded-2xl p-6 shadow-sm border border-blue-100 relative overflow-hidden">
                <div id="loadingOverlay" class="absolute inset-0 bg-white/80 flex items-center justify-center z-10 hidden">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
                </div>
                
                <div class="flex justify-between items-start mb-4">
                    <span class="text-xs font-bold uppercase tracking-wider text-blue-600 bg-blue-50 px-2 py-1 rounded">กำลังติดตาม</span>
                    <span id="lastCheckTime" class="text-xs text-slate-400">ยังไม่มีการตรวจสอบ</span>
                </div>

                <div id="currentStatus" class="text-lg font-medium text-slate-800 mb-2">รอการตรวจสอบครั้งแรก...</div>
                <div id="statusDetails" class="text-sm text-slate-500 leading-relaxed italic">ข้อมูลจะอัปเดตอัตโนมัติ</div>
            </div>

            <div class="bg-slate-800 rounded-2xl p-4 text-white text-xs font-mono overflow-x-auto">
                <div class="flex justify-between mb-2 border-b border-slate-700 pb-1">
                    <span>LOGS</span>
                    <button onclick="document.getElementById('logContent').innerHTML=''" class="hover:text-red-400 text-[10px]">ล้าง</button>
                </div>
                <div id="logContent" class="space-y-1 opacity-80"></div>
            </div>
        </div>

        <!-- Notification Sound -->
        <audio id="alertSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>
    </div>

    <script>
        const apiKey = ""; // แพลตฟอร์มจะจัดการให้
        let monitoringInterval = null;
        let lastStatusText = "";
        let isRunning = false;

        const trackingInput = document.getElementById('trackingNumber');
        const intervalSelect = document.getElementById('interval');
        const startBtn = document.getElementById('startBtn');
        const displayArea = document.getElementById('displayArea');
        const currentStatusEl = document.getElementById('currentStatus');
        const statusDetailsEl = document.getElementById('statusDetails');
        const lastCheckTimeEl = document.getElementById('lastCheckTime');
        const logContent = document.getElementById('logContent');
        const loadingOverlay = document.getElementById('loadingOverlay');
        const alertSound = document.getElementById('alertSound');

        function addLog(msg) {
            const now = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.innerHTML = `<span class="text-blue-400">[${now}]</span> ${msg}`;
            logContent.prepend(div);
        }

        async function checkParcelStatus() {
            loadingOverlay.classList.remove('hidden');
            const trackingNo = trackingInput.value;
            const query = `Check status of Lazada Express LEX tracking number ${trackingNo} in Thailand. Provide the latest update location and status description.`;
            
            addLog(`เริ่มดึงข้อมูลจาก LEX: ${trackingNo}`);

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: query }] }],
                        tools: [{ "google_search": {} }],
                        systemInstruction: { parts: [{ text: "You are a parcel tracking assistant. Extract only the latest status, time, and location from the search results. Respond concisely in Thai." }] }
                    })
                });

                const data = await response.json();
                const resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || "ไม่พบข้อมูล";

                updateUI(resultText);
                
                // ตรวจสอบการเปลี่ยนแปลง
                if (lastStatusText !== "" && lastStatusText !== resultText) {
                    triggerNotification(resultText);
                }
                lastStatusText = resultText;

            } catch (error) {
                addLog(`Error: ${error.message}`);
                currentStatusEl.innerText = "เกิดข้อผิดพลาดในการเชื่อมต่อ";
            } finally {
                loadingOverlay.classList.add('hidden');
                lastCheckTimeEl.innerText = `ล่าสุด: ${new Date().toLocaleTimeString()}`;
            }
        }

        function updateUI(text) {
            // แยกบรรทัดแรกมาเป็นหัวข้อ
            const lines = text.split('\n');
            currentStatusEl.innerText = lines[0] || "ไม่ทราบสถานะ";
            statusDetailsEl.innerText = lines.slice(1).join(' ') || "กำลังจัดส่งตามกำหนดการ";
            addLog(`ได้รับข้อมูล: ${lines[0].substring(0, 30)}...`);
        }

        function triggerNotification(newStatus) {
            addLog("!! ตรวจพบความเคลื่อนไหว !!");
            alertSound.play().catch(e => console.log("Sound error:", e));
            
            if (Notification.permission === "granted") {
                new Notification("พัสดุของคุณมอสขยับแล้ว!", {
                    body: newStatus,
                    icon: "https://img.icons8.com/color/96/delivery.png"
                });
            } else {
                alert("พัสดุมีการอัปเดตใหม่!\n" + newStatus);
            }
        }

        startBtn.addEventListener('click', () => {
            if (!isRunning) {
                // ขอสิทธิ์แจ้งเตือน
                if (Notification.permission !== "granted") {
                    Notification.requestPermission();
                }

                isRunning = true;
                startBtn.innerHTML = '<i class="fas fa-stop"></i> หยุดติดตาม';
                startBtn.classList.replace('bg-blue-600', 'bg-red-500');
                startBtn.classList.replace('hover:bg-blue-700', 'hover:bg-red-600');
                displayArea.classList.remove('hidden');
                
                checkParcelStatus();
                const minutes = parseInt(intervalSelect.value);
                monitoringInterval = setInterval(checkParcelStatus, minutes * 60000);
                
                addLog(`เริ่มทำงานทุกๆ ${minutes} นาที`);
            } else {
                isRunning = false;
                startBtn.innerHTML = '<i class="fas fa-play"></i> เริ่มติดตามสถานะ';
                startBtn.classList.replace('bg-red-500', 'bg-blue-600');
                startBtn.classList.replace('hover:bg-red-600', 'hover:bg-blue-700');
                clearInterval(monitoringInterval);
                addLog("หยุดการติดตาม");
            }
        });
    </script>
</body>
</html>
