        <div class="mt-6">

    <script>
        function convertToJson() {
            const asOfMonthYears = document.getElementById('asOfMonthYears').value.trim();
            const cardName = document.getElementById('cardName').value.trim();
            const plainTextRaw = document.getElementById('plainTextRaw').value.trim();
            const outputDiv = document.getElementById('output');
            outputDiv.innerHTML = ''; // ล้างผลลัพธ์เก่า

            // ตรวจสอบว่าผู้ใช้กรอกข้อมูลครบถ้วนหรือไม่
            if (!asOfMonthYears || !cardName || !plainTextRaw) {
                outputDiv.innerHTML = '<div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert">กรุณากรอกข้อมูลให้ครบถ้วนทุกช่อง</div>';
                return;
            }

            // แยกข้อความดิบออกเป็นแต่ละบรรทัด และกรองบรรทัดว่างออก
            const lines = plainTextRaw.split('\n').filter(line => line.trim() !== '');
            const results = [];

            lines.forEach(line => {
                // Regex ที่ปรับปรุงใหม่:
                // ^(?:\d{2}\/\d{2}\/\d{2}\s+){1,2} : ตรงกับรูปแบบวันที่ (DD/MM/YY) ที่อาจปรากฏ 1 หรือ 2 ครั้งในตอนต้นบรรทัด
                // (.*?) : Captures the description (non-greedy), matching anything until the next part of regex.
                // \s* : Matches optional spaces before the amount part.
                // (?:(-)\s*)? : Optional non-capturing group for the negative sign.
                //               If present, it captures '-' into a separate group (match[2]).
                // ([\d,]+\.\d{2})$ : Captures the numeric part of the amount (digits, comma, dot, 2 digits) at the end of the line.
                const match = line.match(/^(?:\d{2}\/\d{2}\/\d{2}\s+){1,2}(.*?)\s*(?:(-)\s*)?([\d,]+\.\d{2})$/);
                
                if (match) {
                    let description = match[1].trim();
                    const negativeSign = match[2]; // This will be '-' if found, otherwise undefined
                    let amountValue = match[3].trim(); // This will be "5,450.82"

                    // Remove commas and parse to float
                    amountValue = parseFloat(amountValue.replace(/,/g, ''));

                    // Apply negative sign if it was present in the original string
                    let amount = negativeSign === '-' ? -amountValue : amountValue;

                    // Handle trailing "TH" or "US" in description
                    const trailingKeywords = /\s+(?:TH|US)$/i;
                    if (trailingKeywords.test(description)) {
                        description = description.replace(trailingKeywords, '').trim();
                    }

                    results.push({
                        asOfMonthYears: asOfMonthYears,
                        cardName: cardName,
                        description: description,
                        amount: amount
                    });
                } else {
                    // หากไม่สามารถแยกข้อมูลได้ ให้แจ้งเตือนใน console และเพิ่มรายการที่มีข้อผิดพลาด
                    console.warn(`ไม่สามารถแยกข้อมูลบรรทัดนี้ได้: ${line}`);
                    results.push({
                        asOfMonthYears: asOfMonthYears,
                        cardName: cardName,
                        description: `[ERROR] Could not parse: ${line}`,
                        amount: 0 // กำหนดค่าเริ่มต้นเป็น 0 หรือ null
                    });
                }
            });

            // แสดงผลลัพธ์ในรูปแบบ JSON ที่จัดฟอร์แมตสวยงาม
            outputDiv.textContent = JSON.stringify(results, null, 2);
        }
    </script>
